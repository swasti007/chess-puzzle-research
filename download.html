<script>
async function handleOAuthCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    
    const storedState = localStorage.getItem('oauth_state');
    if (state !== storedState) {
        alert('State mismatch - possible security issue. Please try again.');
        return;
    }
    
    const codeVerifier = localStorage.getItem('code_verifier');
    const clientId = 'puzzle-research-app';
    const redirectUri = 'https://swasti007.github.io/chess-puzzle-research/download.html';
    
    // Exchange code for token
    const tokenResponse = await fetch('https://lichess.org/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
            grant_type: 'authorization_code',
            code: code,
            redirect_uri: redirectUri,
            client_id: clientId,
            code_verifier: codeVerifier
        })
    });
    
    if (!tokenResponse.ok) {
        alert('Error getting token: ' + await tokenResponse.text());
        return;
    }
    
    const { access_token } = await tokenResponse.json();
    
    // Fetch puzzle activity (NDJSON as string)
    const activityResponse = await fetch('https://lichess.org/api/puzzle/activity', {
        headers: {
            Authorization: `Bearer ${access_token}`,
            Accept: 'application/x-ndjson'
        }
    });
    const activityData = await activityResponse.text();
    
    // Fetch ratings (JSON as string)
    const ratingsResponse = await fetch('https://lichess.org/api/account', {
        headers: { Authorization: `Bearer ${access_token}` }
    });
    const accountData = await ratingsResponse.json();
    const ratings = {
        puzzle: accountData.perfs?.puzzle || {},
        rapid: accountData.perfs?.rapid || {},
        classical: accountData.perfs?.classical || {}
    };
    const ratingsJson = JSON.stringify(ratings, null, 2);
    
    // Display upload button
    document.body.innerHTML += `
        <p>Data fetched successfully! Click below to upload anonymously to the researcher's secure Google Drive.</p>
        <button id="uploadBtn">Upload to Researcher</button>
        <p id="status"></p>
    `;
    
    // Upload button: POST to Apps Script
    document.getElementById('uploadBtn').addEventListener('click', async () => {
        if (!confirm('This will upload your anonymized data directly to the researcher\'s secure Google Drive. Proceed?')) return;
        
        const formData = new FormData();
        formData.append('activity_file', new Blob([activityData], { type: 'application/x-ndjson' }));
        formData.append('ratings_file', new Blob([ratingsJson], { type: 'application/json' }));
        
        try {
            const response = await fetch('https://script.google.com/macros/s/AKfycbyAABXKE8eqeTANjSDbvTnM9ZJQlj2vKdFN3Qf6b8WRFr0DyqozyqCswZUXVOGqNRPeCQ/exec', {  // Replace with your web app URL
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (result.status === 'success') {
                document.getElementById('status').textContent = 'Upload successful! Thank you.';
            } else {
                document.getElementById('status').textContent = 'Error: ' + result.message;
            }
        } catch (error) {
            document.getElementById('status').textContent = 'Error: ' + error.message;
        }
    });
    
    // Clean up
    localStorage.removeItem('code_verifier');
    localStorage.removeItem('oauth_state');
}

handleOAuthCallback();
</script>
