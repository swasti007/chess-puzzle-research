<script>
async function handleOAuthCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    
    const storedState = localStorage.getItem('oauth_state');
    if (state !== storedState) {
        alert('State mismatch - possible security issue. Please try again.');
        return;
    }
    
    const codeVerifier = localStorage.getItem('code_verifier');
    const clientId = 'puzzle-research-app';
    const redirectUri = 'https://swasti007.github.io/chess-puzzle-research/download.html';
    
    // Exchange code for token
    const tokenResponse = await fetch('https://lichess.org/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
            grant_type: 'authorization_code',
            code: code,
            redirect_uri: redirectUri,
            client_id: clientId,
            code_verifier: codeVerifier
        })
    });
    
    if (!tokenResponse.ok) {
        alert('Error getting token: ' + await tokenResponse.text());
        return;
    }
    
    const { access_token } = await tokenResponse.json();
    
    // Fetch puzzle activity (NDJSON as string)
    const activityResponse = await fetch('https://lichess.org/api/puzzle/activity', {
        headers: {
            Authorization: `Bearer ${access_token}`,
            Accept: 'application/x-ndjson'
        }
    });
    const activityData = await activityResponse.text();
    
    // Fetch ratings (JSON as string)
    const ratingsResponse = await fetch('https://lichess.org/api/account', {
        headers: { Authorization: `Bearer ${access_token}` }
    });
    const accountData = await ratingsResponse.json();
    const ratings = {
        puzzle: accountData.perfs?.puzzle || {},
        rapid: accountData.perfs?.rapid || {},
        classical: accountData.perfs?.classical || {}
    };
    const ratingsJson = JSON.stringify(ratings, null, 2);
    
    // Upload to file.io and get links
    async function uploadToFileIo(data, filename, type) {
        const formData = new FormData();
        formData.append('file', new Blob([data], { type }), filename);
        formData.append('expires', '1d'); // Expire after 1 day for privacy
        
        const response = await fetch('https://file.io/', {
            method: 'POST',
            body: formData
        });
        if (!response.ok) throw new Error('Upload failed');
        const { link } = await response.json();
        return link;
    }
    
    let activityLink, ratingsLink;
    try {
        activityLink = await uploadToFileIo(activityData, 'my_lichess_puzzle_activity.ndjson', 'application/x-ndjson');
        ratingsLink = await uploadToFileIo(ratingsJson, 'my_lichess_ratings.json', 'application/json');
        
        document.body.innerHTML += `
            <p>Data uploaded anonymously! Copy these temporary links and send them to the researcher (swasti.sunder.das@abdn.ac.uk):</p>
            <p>Activity Link: <a href="${activityLink}" target="_blank">${activityLink}</a></p>
            <p>Ratings Link: <a href="${ratingsLink}" target="_blank">${ratingsLink}</a></p>
        `;
    } catch (error) {
        document.body.innerHTML += '<p>Error uploading: ' + error.message + '</p>';
    }
    
    // Clean up
    localStorage.removeItem('code_verifier');
    localStorage.removeItem('oauth_state');
}

handleOAuthCallback();
</script>
